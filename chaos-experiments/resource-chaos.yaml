  namespace: chaos-poc
spec:
  action: stress
  mode: all
  selector:
    namespaces:
      - chaos-poc
    labelSelectors:
      app: postgres
  stressors:
    memory:
      workers: 1
      size: "256Mi"
  duration: "5m"
  scheduler:
    cron: "@hourly"
---
# Disk I/O Stress - estresse no disco
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: postgres-io-stress
  namespace: chaos-poc
spec:
  action: stress
  mode: all
  selector:
    namespaces:
      - chaos-poc
    labelSelectors:
      app: postgres
  stressors:
    io:
      workers: 1
      size: "1Gi"
  duration: "5m"
  scheduler:
    cron: "@hourly"
